name: Create Oracle training folder

on:
  schedule:
    # 15:05 UTC is 00:05 the next day in Asia/Seoul.
    - cron: "5 15 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "YYYY-MM-DD date to create. Defaults to today's date in Asia/Seoul."
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-folder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target date
        id: date
        env:
          INPUT_DATE: ${{ inputs.target_date }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_DATE:-}" ]; then
            target_date="$INPUT_DATE"
          else
            target_date="$(TZ=Asia/Seoul date +%F)"
          fi

          echo "target_date=$target_date" >> "$GITHUB_OUTPUT"

      - name: Create today's scheduled folder
        id: create
        run: |
          set -euo pipefail

          target_date="${{ steps.date.outputs.target_date }}"

          if ! [[ "$target_date" =~ ^2026-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "$target_date is not a valid 2026 date."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          weekday="$(TZ=Asia/Seoul date -d "$target_date" +%u)"
          month="${target_date:5:2}"
          should_create=false

          case "$month" in
            07)
              if [[ "$target_date" > "2026-07-19" && "$target_date" < "2026-07-25" ]] || \
                 [[ "$target_date" > "2026-07-26" && "$target_date" < "2026-08-01" ]]; then
                should_create=true
              fi
              ;;
            08)
              if [ "$weekday" -ge 1 ] && [ "$weekday" -le 5 ]; then
                should_create=true
              fi
              ;;
            09)
              if [ "$weekday" -ge 1 ] && [ "$weekday" -le 6 ] && \
                 { [[ "$target_date" < "2026-09-24" ]] || [[ "$target_date" > "2026-09-26" ]]; }; then
                should_create=true
              fi
              ;;
            10|11)
              if [ "$weekday" -ge 1 ] && [ "$weekday" -le 6 ]; then
                should_create=true
              fi
              ;;
            12)
              if [ "$weekday" -ge 1 ] && [ "$weekday" -le 5 ] && [[ "$target_date" < "2026-12-19" ]]; then
                should_create=true
              fi
              ;;
          esac

          if [ "$should_create" != true ]; then
            echo "$target_date is not in the Oracle training folder schedule."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          folder="training/Oracle/$target_date"
          mkdir -p "$folder"
          touch "$folder/.gitkeep"

          if [ -n "$(git status --short -- "$folder/.gitkeep")" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "$folder already exists."
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push folder
        if: steps.create.outputs.created == 'true'
        run: |
          set -euo pipefail

          target_date="${{ steps.date.outputs.target_date }}"
          folder="training/Oracle/$target_date"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$folder/.gitkeep"
          git commit -m "Create Oracle training folder for $target_date"
          git push
